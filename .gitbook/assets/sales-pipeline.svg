<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 500" width="1450" height="500" role="img" aria-labelledby="title desc">
  <title id="title">Pipeline de Ventas Estandar</title>
  <desc id="desc">Diagrama de flujo del pipeline de ventas en Go High Level con las etapas principales del proceso comercial.</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .bg-main { fill: #0f172a; }
      .text-title { fill: #f8fafc; font-size: 32px; font-weight: 700; }
      .text-subtitle { fill: #94a3b8; font-size: 18px; font-weight: 400; }
      
      .card { fill: #1e293b; stroke: #334155; stroke-width: 2; rx: 12; }
      .card-title { fill: #f8fafc; font-size: 17px; font-weight: 600; }
      .card-desc { fill: #94a3b8; font-size: 13px; font-weight: 400; }
      
      .arrow { fill: none; stroke: #475569; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-head { fill: #475569; }

      .badge-bg { rx: 6; }
      .badge-text { font-size: 12px; font-weight: 700; text-anchor: middle; }

      /* Stage Colors */
      .c-new { stroke: #3b82f6; fill: rgba(59, 130, 246, 0.15); }
      .t-new { fill: #3b82f6; }
      
      .c-contact { stroke: #0ea5e9; fill: rgba(14, 165, 233, 0.15); }
      .t-contact { fill: #0ea5e9; }
      
      .c-appt { stroke: #8b5cf6; fill: rgba(139, 92, 246, 0.15); }
      .t-appt { fill: #8b5cf6; }
      
      .c-show { stroke: #ec4899; fill: rgba(236, 72, 153, 0.15); }
      .t-show { fill: #ec4899; }
      
      .c-neg { stroke: #f59e0b; fill: rgba(245, 158, 11, 0.15); }
      .t-neg { fill: #f59e0b; }
      
      .c-won { stroke: #10b981; fill: rgba(16, 185, 129, 0.15); }
      .t-won { fill: #10b981; }
      
      .c-lost { stroke: #ef4444; fill: rgba(239, 68, 68, 0.15); }
      .t-lost { fill: #ef4444; }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg-main" width="1450" height="500" />

  <!-- Header -->
  <text x="50" y="70" class="text-title">Pipeline de Oportunidades de Venta</text>
  <text x="50" y="105" class="text-subtitle">El estado final (Won, Lost, Abandon) determina la salida del Pipeline.</text>

  <!-- Pipeline Stages Container -->
  <g transform="translate(40, 160)">
    
    <!-- Stage 1: Oportunidad Nueva -->
    <g transform="translate(0, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-new" />
      <text x="40" y="45" class="badge-text t-new">01</text>
      <text x="20" y="90" class="card-title">Op. Nueva</text>
      <text x="20" y="115" class="card-desc">Intencion confirmada</text>
      <text x="20" y="135" class="card-desc">Validacion de perfil</text>
      <text x="20" y="155" class="card-desc">Definir presu/zona</text>
    </g>

    <!-- Arrow -->
    <path d="M 190 90 L 210 90" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 2: En espera -->
    <g transform="translate(225, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-contact" />
      <text x="40" y="45" class="badge-text t-contact">02</text>
      <text x="20" y="90" class="card-title">En Espera</text>
      <text x="20" y="115" class="card-desc">Compra a futuro</text>
      <text x="20" y="135" class="card-desc">Fecha de reactivacion</text>
      <text x="20" y="155" class="card-desc">Motivo documentado</text>
    </g>

    <!-- Arrow -->
    <path d="M 415 90 L 435 90" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 3: Seleccionando -->
    <g transform="translate(450, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-appt" />
      <text x="40" y="45" class="badge-text t-appt">03</text>
      <text x="20" y="90" class="card-title">Seleccionando</text>
      <text x="20" y="115" class="card-desc">Revision de opciones</text>
      <text x="20" y="135" class="card-desc">Visitas / reuniones</text>
      <text x="20" y="155" class="card-desc">Definir propiedad</text>
    </g>

    <!-- Arrow -->
    <path d="M 640 90 L 660 90" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 4: Bajo Contrato -->
    <g transform="translate(675, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-show" />
      <text x="40" y="45" class="badge-text t-show">04</text>
      <text x="20" y="90" class="card-title">Bajo Contrato</text>
      <text x="20" y="115" class="card-desc">Entrega documentos</text>
      <text x="20" y="135" class="card-desc">Pago de deposito</text>
      <text x="20" y="155" class="card-desc">Formaliza c/ builder</text>
    </g>

    <!-- Arrow -->
    <path d="M 865 90 L 885 90" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 5: Financiando -->
    <g transform="translate(900, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-neg" />
      <text x="40" y="45" class="badge-text t-neg">05</text>
      <text x="20" y="90" class="card-title">Financiando</text>
      <text x="20" y="115" class="card-desc">Pre-approval/Lender</text>
      <text x="20" y="135" class="card-desc">Cash: Proof of funds</text>
      <text x="20" y="155" class="card-desc">Creacion de LLC</text>
    </g>

    <!-- Arrow -->
    <path d="M 1090 90 L 1105 90" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 6: Cerrando -->
    <g transform="translate(1120, 0)">
      <rect class="card" width="160" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-won" />
      <text x="40" y="45" class="badge-text t-won">06</text>
      <text x="20" y="90" class="card-title">Cerrando</text>
      <text x="20" y="115" class="card-desc">Title/Notaria</text>
      <text x="20" y="135" class="card-desc">Walkthrough</text>
      <text x="20" y="155" class="card-desc">Firma y fondos</text>
    </g>

    <!-- Arrows branching out to Won/Lost/Abandon -->
    <path d="M 1290 90 L 1300 90 L 1300 25 L 1315 25" class="arrow" marker-end="url(#arrowhead)" />
    <path d="M 1290 90 L 1300 90 L 1300 155 L 1315 155" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage Won -->
    <g transform="translate(1330, -40)">
      <rect class="card" width="140" height="120" stroke="#10b981" />
      <rect x="15" y="20" width="40" height="40" class="badge-bg c-won" />
      <path d="M 28 40 L 33 45 L 42 35" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="15" y="85" class="card-title t-won">Ganado</text>
      <text x="15" y="105" class="card-desc">Compra cerrada</text>
    </g>

    <!-- Stage Lost/Abandon -->
    <g transform="translate(1330, 100)">
      <rect class="card" width="140" height="120" stroke="#334155" />
      <rect x="15" y="20" width="40" height="40" class="badge-bg c-lost" />
      <path d="M 30 35 L 40 45 M 40 35 L 30 45" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="15" y="85" class="card-title t-lost">Lost/Abandon</text>
      <text x="15" y="105" class="card-desc">Sin ejecucion</text>
    </g>

  </g>

  <!-- Footer Tip -->
  <rect x="50" y="400" width="1340" height="60" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" />
  <!-- Info Icon -->
  <circle cx="85" cy="430" r="12" fill="#3b82f6" />
  <text x="85" y="435" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">i</text>
  <text x="115" y="435" fill="#94a3b8" font-size="15" font-weight="500">
    Regla clave: Una oportunidad entra al pipeline SOLO cuando existe intencion real de compra (no usar con prospectos no validados).
  </text>
</svg>