site_name: Sandra Vargas Realtor Docs
site_description: Procesos, guias y recursos internos para Sandra Vargas Realtor.
docs_dir: docs
site_url: !ENV [SITE_URL, ""]

theme:
  name: material
  language: es
  features:
    - navigation.instant
    - navigation.expand
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Contenido y Prompts:
      - Vista General: contenido/index.md
      - Prompts para Proyectos Nuevos: contenido/prompts-para-proyectos-nuevos.md
      - Prompt de Trabajo: contenido/prompt-de-trabajo.md
      - System Prompt: contenido/system-prompt.md
      - Prompt Supervisor: contenido/prompt-supervisor.md
  - Procesos de Alquiler: procesos-de-alquiler.md
  - Herramientas y Software: herramientas.md
  - Skills:
      - Vista General: skills/index.md
      - Meta Ads Video Copy: skills/meta-ads-video-copy.md
      - Real Estate Modular Ads: skills/real-estate-modular-ads.md
  - Bots y Automatizaciones:
      - Vista General: bots/index.md
      - AI Chatbot + KB Builder Prompts: bots/ai-chatbot-kb-builder-prompts.md
      - AI Chatbot + KB Builder Prompts (ES): bots/ai-chatbot-kb-builder-prompts-es.md
      - Exportar conversaciones desde GHL: bots/exportar-conversaciones-ghl.md
      - Laura:
          - Resumen: bots/laura/index.md
          - Personalidad y Estilo: bots/laura/personality.md
          - Objetivo y Flujo: bots/laura/objetivo-y-flujo.md
          - Reglas Operativas: bots/laura/reglas-y-operacion.md
      - Laura Internacional:
          - Resumen: bots/laura-internacional/index.md
          - Objetivo y Flujo: bots/laura-internacional/goal.md
          - Personalidad y Estilo: bots/laura-internacional/personality.md
          - Informacion Adicional: bots/laura-internacional/additional-information.md
  - Estrategias de Marketing:
      - Vista General: marketing.md
      - Sistema Modular de Ads para Propiedades: marketing/sistema-modular-de-ads.md
      - Guiones de Ads para Propiedades: marketing/guiones-de-ads.md
      - Briefs de Propiedades:
          - Vista General: marketing/propiedades/index.md
          - Crosswinds - Estate Key Collection - Freedom: marketing/propiedades/crosswinds-estate-key-collection-freedom.md
          - Marion Creek - Elm - 743 Hazelwood Court: marketing/propiedades/marion-creek-elm-743-hazelwood-court.md
          - Ranches at Lake McLeod - Aspire: marketing/propiedades/ranches-at-lake-mcleod-aspire.md
  - Reclutamiento de Agentes:
      - Presentación del Broker: reclutamiento/presentacion-broker.md
  - Guía de Inicio:
      - Vista General: onboarding.md
      - Los Primeros 90 Días: primeros-90-dias.md
  - Pipelines de Venta: pipelines-de-venta.md
  - Procesos de Venta:
      - Vista General: ventas.md
      - Primer filtro de compradores interesados: ventas/primer-filtro-compradores-interesados.md
