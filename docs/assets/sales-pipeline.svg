<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" width="1400" height="500" role="img" aria-labelledby="title desc">
  <title id="title">Pipeline de Ventas Estándar</title>
  <desc id="desc">Diagrama de flujo del pipeline de ventas en Go High Level con las etapas principales del proceso comercial.</desc>
  <defs>
    <style>
      <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      .bg-main { fill: #0f172a; }
      .text-title { fill: #f8fafc; font-size: 32px; font-weight: 700; }
      .text-subtitle { fill: #94a3b8; font-size: 18px; font-weight: 400; }
      
      .card { fill: #1e293b; stroke: #334155; stroke-width: 2; rx: 12; }
      .card-title { fill: #f8fafc; font-size: 18px; font-weight: 600; }
      .card-desc { fill: #94a3b8; font-size: 13px; font-weight: 400; }
      
      .arrow { fill: none; stroke: #475569; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-head { fill: #475569; }

      .badge-bg { rx: 6; }
      .badge-text { font-size: 12px; font-weight: 700; text-anchor: middle; }

      /* Stage Colors */
      .c-new { stroke: #3b82f6; fill: rgba(59, 130, 246, 0.15); }
      .t-new { fill: #3b82f6; }
      
      .c-contact { stroke: #0ea5e9; fill: rgba(14, 165, 233, 0.15); }
      .t-contact { fill: #0ea5e9; }
      
      .c-appt { stroke: #8b5cf6; fill: rgba(139, 92, 246, 0.15); }
      .t-appt { fill: #8b5cf6; }
      
      .c-show { stroke: #ec4899; fill: rgba(236, 72, 153, 0.15); }
      .t-show { fill: #ec4899; }
      
      .c-neg { stroke: #f59e0b; fill: rgba(245, 158, 11, 0.15); }
      .t-neg { fill: #f59e0b; }
      
      .c-won { stroke: #10b981; fill: rgba(16, 185, 129, 0.15); }
      .t-won { fill: #10b981; }
      
      .c-lost { stroke: #ef4444; fill: rgba(239, 68, 68, 0.15); }
      .t-lost { fill: #ef4444; }
      ]]>
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow-head" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg-main" width="1400" height="500" />

  <!-- Header -->
  <text x="80" y="70" class="text-title">Pipeline de Ventas (Go High Level)</text>
  <text x="80" y="105" class="text-subtitle">Flujo estándar de oportunidades comerciales y seguimiento automatizado.</text>

  <!-- Pipeline Stages Container -->
  <g transform="translate(80, 160)">
    
    <!-- Stage 1: Lead Nuevo -->
    <g transform="translate(0, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-new" />
      <text x="40" y="45" class="badge-text t-new">01</text>
      <text x="20" y="90" class="card-title">Lead Nuevo</text>
      <text x="20" y="115" class="card-desc">Ingreso vía web o ads</text>
      <text x="20" y="135" class="card-desc">Autorespuesta activa</text>
      <text x="20" y="155" class="card-desc">Asignación de asesor</text>
    </g>

    <!-- Arrow -->
    <path d="M 190 90 L 210 90" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 2: Contactado -->
    <g transform="translate(225, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-contact" />
      <text x="40" y="45" class="badge-text t-contact">02</text>
      <text x="20" y="90" class="card-title">Contactado</text>
      <text x="20" y="115" class="card-desc">Llamada inicial hecha</text>
      <text x="20" y="135" class="card-desc">Calificación del Lead</text>
      <text x="20" y="155" class="card-desc">Nurturing en proceso</text>
    </g>

    <!-- Arrow -->
    <path d="M 415 90 L 435 90" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 3: Cita Agendada -->
    <g transform="translate(450, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-appt" />
      <text x="40" y="45" class="badge-text t-appt">03</text>
      <text x="20" y="90" class="card-title">Cita Agendada</text>
      <text x="20" y="115" class="card-desc">Reunión confirmada</text>
      <text x="20" y="135" class="card-desc">Recordatorios auto</text>
      <text x="20" y="155" class="card-desc">(SMS / Email / WA)</text>
    </g>

    <!-- Arrow -->
    <path d="M 640 90 L 660 90" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 4: Presentación -->
    <g transform="translate(675, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-show" />
      <text x="40" y="45" class="badge-text t-show">04</text>
      <text x="20" y="90" class="card-title">Presentación</text>
      <text x="20" y="115" class="card-desc">Visita o Zoom realizado</text>
      <text x="20" y="135" class="card-desc">Envío de propuesta</text>
      <text x="20" y="155" class="card-desc">Resolución de dudas</text>
    </g>

    <!-- Arrow -->
    <path d="M 865 90 L 885 90" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 5: Negociación -->
    <g transform="translate(900, 0)">
      <rect class="card" width="180" height="180" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-neg" />
      <text x="40" y="45" class="badge-text t-neg">05</text>
      <text x="20" y="90" class="card-title">Negociación</text>
      <text x="20" y="115" class="card-desc">Revisión de oferta</text>
      <text x="20" y="135" class="card-desc">Condiciones de pago</text>
      <text x="20" y="155" class="card-desc">Cierre inminente</text>
    </g>

    <!-- Arrows branching out to Won/Lost -->
    <path d="M 1090 90 L 1115 90 L 1115 25 L 1135 25" class="arrow" marker-end="url(#arrowhead)" />
    <path d="M 1090 90 L 1115 90 L 1115 155 L 1135 155" class="arrow" marker-end="url(#arrowhead)" />

    <!-- Stage 6: Ganado -->
    <g transform="translate(1150, -40)">
      <rect class="card" width="170" height="120" stroke="#10b981" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-won" />
      <path d="M 33 40 L 38 45 L 47 35" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="20" y="85" class="card-title t-won">Cierre Ganado</text>
      <text x="20" y="105" class="card-desc">Contrato firmado</text>
    </g>

    <!-- Stage 7: Perdido -->
    <g transform="translate(1150, 100)">
      <rect class="card" width="170" height="120" stroke="#334155" />
      <rect x="20" y="20" width="40" height="40" class="badge-bg c-lost" />
      <path d="M 35 35 L 45 45 M 45 35 L 35 45" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="20" y="85" class="card-title t-lost">Perdido</text>
      <text x="20" y="105" class="card-desc">Campańa de reactivación</text>
    </g>

  </g>

  <!-- Footer Tip -->
  <rect x="80" y="400" width="1240" height="60" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" />
  <!-- Info Icon -->
  <circle cx="115" cy="430" r="12" fill="#3b82f6" />
  <text x="115" y="435" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">i</text>
  <text x="145" y="435" fill="#94a3b8" font-size="15" font-weight="500">
    Automatización clave: Cada cambio de etapa en Go High Level debe disparar notificaciones internas, etiquetas o flujos de nutrición automáticos.
  </text>
</svg>